<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vyntra Social</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/theme.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/comments.js"></script>
    <script defer src="js/likes.js"></script>
    <script defer src="js/follows.js"></script>
    <script defer src="js/posts.js"></script>
    <script defer src="js/profile.js"></script>
    <script defer src="js/main.js"></script>
  </head>
  <body data-page="home" data-auth="optional">
    <div id="appNavbar"></div>
    <main class="app-shell">
      <section class="home-feed-shell">
        <div data-config-warning></div>
        <header class="home-intro">
          <div>
            <p class="eyebrow mb-2" data-feed-eyebrow>Public community feed</p>
            <h1 class="page-title" data-feed-title>Home Feed</h1>
            <p class="muted-text mb-0" data-feed-subtitle>Newest posts from the Vyntra community.</p>
          </div>
        </header>
        <div id="feedList" class="stack-gap" aria-live="polite"></div>
      </section>
    </main>
    <footer class="site-footer">
      <span>Vyntra Social</span>
      <span>Connect. Share. Grow.</span>
    </footer>
    <nav id="mobileBottomNav" aria-label="Mobile navigation"></nav>
  </body>
</html>
