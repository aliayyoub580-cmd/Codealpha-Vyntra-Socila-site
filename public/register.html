<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Vyntra Social</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/theme.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/main.js"></script>
  </head>
  <body data-page="register" data-auth="guest">
    <main class="auth-page">
      <div class="auth-layout">
        <section class="auth-panel auth-brand-panel">
          <a class="brand-link" href="/">
            <img src="assets/logo.png" alt="Vyntra Social logo">
            <span>Vyntra Social</span>
          </a>
          <div>
            <h1 class="display-6 fw-bold mb-3">Create your space</h1>
            <p class="mb-0">Build a profile, publish rich posts, and grow with your community.</p>
          </div>
          <div class="auth-proof">
            <div><strong>Profiles</strong><span class="d-block small">Bio and cover</span></div>
            <div><strong>Uploads</strong><span class="d-block small">Images and PDF</span></div>
            <div><strong>Reach</strong><span class="d-block small">Followers</span></div>
          </div>
        </section>
        <section class="auth-panel">
          <div data-config-warning></div>
          <h2 class="page-title mb-2">Register</h2>
          <p class="muted-text mb-4">Choose a unique username and secure password.</p>
          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="fullName">Full name</label>
              <input class="form-control" id="fullName" name="full_name" type="text" autocomplete="name" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <input class="form-control" id="username" name="username" type="text" autocomplete="username" placeholder="atif_creator" minlength="3" maxlength="30" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="registerEmail">Email address</label>
              <input class="form-control" id="registerEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="registerPassword">Password</label>
              <input class="form-control" id="registerPassword" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" minlength="8" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="confirmPassword">Confirm password</label>
              <input class="form-control" id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" placeholder="Repeat password" minlength="8" required>
            </div>
            <button class="btn btn-vyntra w-100 d-inline-flex align-items-center justify-content-center gap-2" type="submit"><i data-lucide="user-plus"></i>Create Account</button>
          </form>
          <button class="btn btn-outline-vyntra w-100 d-inline-flex align-items-center justify-content-center gap-2 mt-3" type="button" data-google-login><i data-lucide="chrome"></i>Continue with Google</button>
          <p class="muted-text mt-4 mb-0">Already have an account? <a class="fw-semibold" href="/login">Login</a></p>
        </section>
      </div>
    </main>
  </body>
</html>
