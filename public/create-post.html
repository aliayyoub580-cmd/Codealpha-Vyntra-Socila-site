<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create a Post | Vyntra Social</title>
    <meta name="description" content="Create and share posts on Vyntra Social. Publish your thoughts, ideas, updates, and images with your online community.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/posts.js"></script>
    <script defer src="/js/profile.js"></script>
    <script defer src="/js/main.js"></script>
  </head>
  <body data-page="create" data-auth="required">
    <div id="appNavbar"></div>
    <main class="app-shell">
      <div class="layout-grid">
        <div class="sidebar-panel js-sidebar"></div>
        <section class="feed-column">
          <div data-config-warning></div>
          <form class="form-card compose-card" id="createPostForm" enctype="multipart/form-data" novalidate>
            <div class="mb-4">
              <h1 class="page-title">Create Post</h1>
              <p class="muted-text mb-0">Publish a title, description, image, and optional PDF.</p>
            </div>
            <div class="mb-3">
              <label class="form-label" for="postTitle">Post title</label>
              <input class="form-control" id="postTitle" name="title" type="text" maxlength="140" placeholder="Give your post a clear title" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="postDescription">Post description</label>
              <textarea class="form-control" id="postDescription" name="description" placeholder="Share the details" required></textarea>
            </div>
            <div class="row g-3 align-items-start">
              <div class="col-md-6">
                <label class="form-label d-block" for="postImage">Post image</label>
                <div class="source-switch mb-3" aria-label="Choose image source">
                  <button class="source-switch-button active" type="button" data-image-source="upload" aria-pressed="true">
                    <i data-lucide="upload"></i><span>Upload</span>
                  </button>
                  <button class="source-switch-button" type="button" data-image-source="url" aria-pressed="false">
                    <i data-lucide="link"></i><span>Image URL</span>
                  </button>
                </div>
                <div data-image-source-panel="upload">
                  <input class="form-control" id="postImage" name="image" type="file" accept="image/jpeg,image/png,image/webp">
                  <p class="caption mt-2 mb-0">JPG, PNG, WEBP up to 5 MB.</p>
                </div>
                <div class="d-none" data-image-source-panel="url">
                  <label class="visually-hidden" for="postImageUrl">Image URL</label>
                  <input class="form-control" id="postImageUrl" name="image_url" type="url" inputmode="url" maxlength="2048" placeholder="https://example.com/image.jpg">
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="postPdf">PDF file</label>
                <input class="form-control" id="postPdf" name="pdf" type="file" accept="application/pdf">
                <p class="caption mt-2 mb-0">PDF up to 10 MB.</p>
              </div>
            </div>
            <div id="imagePreview" class="upload-preview"></div>
            <div id="pdfPreview" class="upload-preview"></div>
            <div class="d-flex gap-2 mt-4 flex-wrap">
              <button class="btn btn-vyntra d-inline-flex align-items-center gap-2" type="submit"><i data-lucide="send"></i>Publish Post</button>
              <a class="btn btn-outline-vyntra d-inline-flex align-items-center gap-2" href="/"><i data-lucide="arrow-left"></i>Back</a>
            </div>
          </form>
        </section>
        <div class="right-panel js-right-panel"></div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="site-footer-brand">
        <span class="site-footer-title">Vyntra Social</span>
        <span>Connect. Share. Grow.</span>
      </div>
      <div class="site-footer-links" aria-label="Footer links">
        <a href="/about">About</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms &amp; Conditions</a>
      </div>
    </footer>
    <nav id="mobileBottomNav" aria-label="Mobile navigation"></nav>
  </body>
</html>
