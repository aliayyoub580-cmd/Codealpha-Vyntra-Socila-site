<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Vyntra Social</title>
    <meta name="description" content="Login to Vyntra Social to return to your feed, profile, shared posts, and online community.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/main.js"></script>
  </head>
  <body data-page="login" data-auth="guest">
    <main class="auth-page">
      <div class="auth-layout">
        <section class="auth-panel auth-brand-panel">
          <a class="brand-link" href="/">
            <img src="/assets/logo.png" alt="Vyntra Social logo" width="34" height="34">
            <span>Vyntra Social</span>
          </a>
          <div>
            <h1 class="display-6 fw-bold mb-3">Connect. Share. Grow.</h1>
            <p class="mb-0">Return to your feed, profile, and shared ideas.</p>
          </div>
          <div class="auth-proof">
            <div><strong>Secure</strong><span class="d-block small">Supabase Auth</span></div>
            <div><strong>Fast</strong><span class="d-block small">Google login</span></div>
            <div><strong>Social</strong><span class="d-block small">Real actions</span></div>
          </div>
        </section>
        <section class="auth-panel">
          <div data-config-warning></div>
          <h2 class="page-title mb-2">Login</h2>
          <p class="muted-text mb-4">Use your email and password to continue.</p>
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="loginEmail">Email address</label>
              <input class="form-control" id="loginEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="loginPassword">Password</label>
              <input class="form-control" id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
            </div>
            <button class="btn btn-vyntra w-100 d-inline-flex align-items-center justify-content-center gap-2" type="submit"><i data-lucide="log-in"></i>Login</button>
          </form>
          <div class="d-grid gap-3 mt-3">
            <button class="btn btn-outline-vyntra d-inline-flex align-items-center justify-content-center gap-2" type="button" data-google-login><i data-lucide="chrome"></i>Continue with Google</button>
          </div>
          <p class="muted-text mt-4 mb-0">New here? <a class="fw-semibold" href="/register">Create an account</a></p>
        </section>
      </div>
    </main>
    <footer class="site-footer">
      <div class="site-footer-brand">
        <span class="site-footer-title">Vyntra Social</span>
        <span>Connect. Share. Grow.</span>
      </div>
      <div class="site-footer-links" aria-label="Footer links">
        <a href="/about">About</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms &amp; Conditions</a>
      </div>
    </footer>
  </body>
</html>
