<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings | Vyntra Social</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/follows.js"></script>
    <script defer src="/js/profile.js"></script>
    <script defer src="/js/main.js"></script>
  </head>
  <body data-page="settings" data-auth="required">
    <div id="appNavbar"></div>
    <main class="app-shell">
      <div class="layout-grid">
        <div class="sidebar-panel js-sidebar"></div>
        <section class="feed-column">
          <div data-config-warning></div>
          <form class="form-card compose-card" id="editProfileForm" novalidate>
            <div class="mb-4">
              <h1 class="page-title">Edit Profile</h1>
              <p class="muted-text mb-0">Update your public identity and images.</p>
            </div>
            <img class="profile-cover" id="editProfileCover" src="/assets/default-cover.jpg" alt="Vyntra Social profile banner preview for online community platform" width="1200" height="500">
            <img class="profile-avatar" id="editProfileAvatar" src="/assets/default-avatar.png" alt="Vyntra Social user profile avatar preview" width="112" height="112">
            <div class="row g-3 mt-2">
              <div class="col-md-6">
                <label class="form-label" for="editFullName">Full name</label>
                <input class="form-control" id="editFullName" name="full_name" type="text" autocomplete="name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="editUsername">Username</label>
                <input class="form-control" id="editUsername" name="username" type="text" autocomplete="username" minlength="3" maxlength="30" required>
              </div>
              <div class="col-12">
                <label class="form-label" for="editBio">Bio</label>
                <textarea class="form-control" id="editBio" name="bio" maxlength="240" placeholder="Share a short bio"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="editProfileImage">Profile image</label>
                <input class="form-control" id="editProfileImage" name="profile_image" type="file" accept="image/jpeg,image/png,image/webp">
                <p class="caption mt-2 mb-0">JPG, PNG, WEBP up to 2 MB.</p>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="editCoverImage">Cover image</label>
                <input class="form-control" id="editCoverImage" name="cover_image" type="file" accept="image/jpeg,image/png,image/webp">
                <p class="caption mt-2 mb-0">JPG, PNG, WEBP up to 5 MB.</p>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4 flex-wrap">
              <button class="btn btn-vyntra d-inline-flex align-items-center gap-2" type="submit"><i data-lucide="save"></i>Save Profile</button>
              <a class="btn btn-outline-vyntra d-inline-flex align-items-center gap-2" href="/profile"><i data-lucide="arrow-left"></i>Back</a>
            </div>
          </form>
        </section>
        <div class="right-panel js-right-panel"></div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="site-footer-brand">
        <span class="site-footer-title">Vyntra Social</span>
        <span>Connect. Share. Grow.</span>
      </div>
      <div class="site-footer-links" aria-label="Footer links">
        <a href="/about">About</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms &amp; Conditions</a>
      </div>
    </footer>
    <nav id="mobileBottomNav" aria-label="Mobile navigation"></nav>
  </body>
</html>
