<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explore Posts | Vyntra Social</title>
    <meta name="description" content="Explore public posts, discover creators, search topics, and find new conversations on Vyntra Social.">
    <meta name="keywords" content="Vyntra Social, social networking platform, social media platform, online community, share posts, create posts, explore posts, follow users, user profiles, connect online, modern social platform">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vyntra-socila.vercel.app/explore">
    <meta property="og:title" content="Explore Posts | Vyntra Social">
    <meta property="og:description" content="Explore public posts, discover creators, search topics, and find new conversations on Vyntra Social.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vyntra Social">
    <meta property="og:url" content="https://vyntra-socila.vercel.app/explore">
    <meta property="og:image" content="https://vyntra-socila.vercel.app/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Explore Posts | Vyntra Social">
    <meta name="twitter:description" content="Explore public posts, discover creators, search topics, and find new conversations on Vyntra Social.">
    <meta name="twitter:image" content="https://vyntra-socila.vercel.app/og-image.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/comments.js"></script>
    <script defer src="/js/likes.js"></script>
    <script defer src="/js/follows.js"></script>
    <script defer src="/js/posts.js"></script>
    <script defer src="/js/profile.js"></script>
    <script defer src="/js/main.js"></script>
  </head>
  <body data-page="explore" data-auth="optional">
    <div id="appNavbar"></div>
    <main class="app-shell">
      <section class="home-feed-shell">
        <div data-config-warning></div>
        <header class="home-intro">
          <div>
            <p class="eyebrow mb-2" data-feed-eyebrow>Explore Vyntra</p>
            <h1 class="page-title" data-feed-title>Explore Posts</h1>
            <p class="muted-text mb-0" data-feed-subtitle>Browse public posts, discover creators, search topics, and find new conversations on Vyntra Social.</p>
          </div>
          <div class="home-cta" aria-label="Explore Vyntra Social actions">
            <a class="btn btn-vyntra d-inline-flex align-items-center gap-2" href="/register"><i data-lucide="user-plus"></i>Join Vyntra Social</a>
            <a class="btn btn-outline-vyntra d-inline-flex align-items-center gap-2" href="/create"><i data-lucide="square-pen"></i>Create a Post</a>
          </div>
        </header>
        <div id="feedList" class="stack-gap" aria-live="polite"></div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="site-footer-brand">
        <span class="site-footer-title">Vyntra Social</span>
        <span>Connect. Share. Grow.</span>
      </div>
      <div class="site-footer-links" aria-label="Footer links">
        <a href="/about">About</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms &amp; Conditions</a>
      </div>
    </footer>
    <nav id="mobileBottomNav" aria-label="Mobile navigation"></nav>

    <!-- Edit Post Modal -->
    <div class="modal fade" id="editPostModal" tabindex="-1" aria-labelledby="editPostModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-header">
            <h5 class="modal-title" id="editPostModalLabel">Edit Post</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editPostId">

            <div class="mb-3">
              <label class="form-label" for="editPostTitle">Post title</label>
              <input type="text" id="editPostTitle" class="form-control" maxlength="140" required>
            </div>

            <div class="mb-3">
              <label class="form-label" for="editPostDescription">Post description</label>
              <textarea id="editPostDescription" class="form-control" rows="5" maxlength="5000" required></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" type="button" onclick="updatePost()">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
