<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profiles | Vyntra Social</title>
    <meta name="description" content="View user profiles on Vyntra Social, follow creators, explore their posts, and connect with people online.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://vyntra-socila.vercel.app/profile">
    <meta property="og:title" content="User Profiles | Vyntra Social">
    <meta property="og:description" content="View user profiles on Vyntra Social, follow creators, explore their posts, and connect with people online.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vyntra Social">
    <meta property="og:url" content="https://vyntra-socila.vercel.app/profile">
    <meta property="og:image" content="https://vyntra-socila.vercel.app/og-image.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/config.js"></script>
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/comments.js"></script>
    <script defer src="/js/likes.js"></script>
    <script defer src="/js/follows.js"></script>
    <script defer src="/js/posts.js"></script>
    <script defer src="/js/profile.js"></script>
    <script defer src="/js/main.js"></script>
  </head>
  <body data-page="profile" data-auth="optional">
    <div id="appNavbar"></div>
    <main class="app-shell">
      <div class="layout-grid">
        <div class="sidebar-panel js-sidebar"></div>
        <section class="feed-column">
          <div data-config-warning></div>
          <nav class="breadcrumb-nav" aria-label="Breadcrumb">
            <a href="/">Home</a><span>/</span><span>Profile</span>
          </nav>
          <div id="profileMount">
            <div class="profile-card">
              <div class="loader-line mb-3" style="height:180px"></div>
              <div class="loader-line w-50 mb-2"></div>
              <div class="loader-line w-25"></div>
            </div>
          </div>
          <div id="relationshipList"></div>
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="section-title">Posts</h2>
          </div>
          <div id="userPosts" class="stack-gap" aria-live="polite"></div>
        </section>
        <div class="right-panel js-right-panel"></div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="site-footer-brand">
        <span class="site-footer-title">Vyntra Social</span>
        <span>Connect. Share. Grow.</span>
      </div>
      <div class="site-footer-links" aria-label="Footer links">
        <a href="/about">About</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/terms">Terms &amp; Conditions</a>
      </div>
    </footer>
    <nav id="mobileBottomNav" aria-label="Mobile navigation"></nav>

    <!-- Edit Post Modal -->
    <div class="modal fade" id="editPostModal" tabindex="-1" aria-labelledby="editPostModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-header">
            <h5 class="modal-title" id="editPostModalLabel">Edit Post</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editPostId">

            <div class="mb-3">
              <label class="form-label" for="editPostTitle">Post title</label>
              <input type="text" id="editPostTitle" class="form-control" maxlength="140" required>
            </div>

            <div class="mb-3">
              <label class="form-label" for="editPostDescription">Post description</label>
              <textarea id="editPostDescription" class="form-control" rows="5" maxlength="5000" required></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" type="button" onclick="updatePost()">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
